services:
  - type: web
    name: quotebot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: DATABASE_URL # Neon/Supabase Postgres — на free-плане нет диска, локальная база сотрётся
        sync: false
      - key: ADMIN_NAME
        value: vanvster
      - key: PROFILE_URL
        value: https://x.com/vanvster
      - key: PYTHON_VERSION
        value: 3.12.7
